name: Ollie Memory Validation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install Valgrind
    - run: |
          sudo apt-get update
          sudo apt-get install -y valgrind

    - name: Ollie Memory Check
      run: make memory_check-CI
